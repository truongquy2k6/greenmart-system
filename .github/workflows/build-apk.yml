name: Build GreenMart Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Create Dummy Secrets Files
      run: |
        # Create empty .env and .env.example files to prevent secrets plugin from failing the build
        touch .env
        touch .env.example
        echo "TEST_KEY=test_value" > .env
        echo "TEST_KEY=test_value" > .env.example

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 9.3.1

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug -PversionCode=${{ github.run_number }} --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GreenMart-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
